<!DOCTYPE html>
<html>
<head>
    <title>Quiz 💖</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding: 50px;
        }

        button {
            display: block;
            margin: 10px auto;
            padding: 12px 25px;
            border-radius: 15px;
            border: none;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            background: #ff1e4d;
        }

        #question {
            font-size: 22px;
            margin-bottom: 20px;
        }

        #message {
            font-size: 18px;
            margin-top: 15px;
            color: #d6336c;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2 id="progress"></h2>
<div id="question"></div>
<div id="options"></div>
<div id="message"></div>

<script>
let q = 0;

const questions = [
{
    q: "Would you still love me if I was a worm? 🐛",
    options: ["Yes 🙂", "No 😐", "I’d build you a tiny house 🥺"],
    answer: 2
},
{
    q: "If I steal your food, what would you do? 🍟",
    options: ["Get angry 😤", "Let me eat 🥺", "Take it back 😒"],
    answer: 1
},
{
    q: "Who is more cute? 😏",
    options: ["Me 😏", "You 💖", "Both 🤭"],
    answer: 1
},
{
    q: "If I turn into a cat, what will you do? 🐱",
    options: ["Ignore me 😐", "Adopt me and spoil me 💖", "Run away 😭"],
    answer: 1
},
{
    q: "If we break up, would you go back to your ex?",
    options: ["Yes 😌", "No 😤", "Maybe 🤔"],
    answer: 0
},
{
    q: "What is my favourite colour? 🎨",
    options: ["Matcha green 💚", "Green 🌿", "Black 🖤"],
    answer: 0
},
{
    q: "Which flavour ice cream do I love? 🍦",
    options: ["Vanilla 🤍", "Butterscotch 🍯", "Both 😋"],
    answer: 2
},
{
    q: "Which type of person am I? 🌊⛰️",
    options: ["Beach person 🌊", "Mountain person ⛰️", "Stay at home 🛋️"],
    answer: 0
},
{
    q: "What is my ideal date? 💕",
    options: ["Movie night 🎬", "Clubbing 💃", "Dinner date 🍽️"],
    answer: 0
},
{
    q: "Who do I love the most?",
    options: ["Joran 💙", "You 💖", "The person reading this 👀", "All of them 💞"],
    answer: 3
}
];

function loadQ() {
    document.getElementById("progress").innerText = "Question " + (q+1) + "/10";
    document.getElementById("question").innerText = questions[q].q;

    let opts = "";
    questions[q].options.forEach((opt, i) => {
        opts += `<button onclick="check(${i})">${opt}</button>`;
    });

    document.getElementById("options").innerHTML = opts;
    document.getElementById("message").innerText = "";
}

function check(i) {
    if(i === questions[q].answer) {
        q++;
        if(q < questions.length) {
            loadQ();
        } else {
            window.location.href = "result.html";
        }
    } else {
        let sound = new Audio("fahh.mp3");
        sound.play().catch(() => {});

        document.getElementById("message").innerText = "try again mister 😒";

        setTimeout(() => {
            document.getElementById("message").innerText = "";
        }, 1200);
    }
}

loadQ();
</script>

</body>
</html>
